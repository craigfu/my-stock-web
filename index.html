<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWSE OpenAPI 數據看板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container my-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">📈 上市公司股利與資安數據</h3>
        </div>
        <div class="card-body">
            <div class="row g-3 mb-4">
                <div class="col-auto">
                    <button id="fetchBtn" class="btn btn-success">更新數據</button>
                </div>
                <div class="col">
                    <input type="text" id="searchInput" class="form-control" placeholder="輸入公司名稱或代號搜尋...">
                </div>
            </div>

            <div id="loading" class="text-center my-3 d-none">
                <div class="spinner-border text-primary" role="status"></div>
                <p>正在從證交所抓取即時資料...</p>
            </div>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>代號</th>
                            <th>公司名稱</th>
                            <th>年度</th>
                            <th>現金股利</th>
                            <th>資安事件</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
