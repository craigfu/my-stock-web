<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣縣市即時預報</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container my-5">
    <div class="header-section text-center mb-5">
        <h1 class="display-5 fw-bold text-primary">🌦️ 台灣各縣市天氣預報</h1>
        <p class="text-muted">資料來源：中央氣象署 (CWA) 開放資料</p>
        <button id="fetchBtn" class="btn btn-primary px-4 shadow-sm">更新天氣</button>
    </div>

    <div class="row justify-content-center mb-4">
        <div class="col-md-6">
            <input type="text" id="searchInput" class="form-control form-control-lg shadow-sm" placeholder="輸入縣市名稱（如：台北市）...">
        </div>
    </div>

    <div id="loading" class="text-center my-5 d-none">
        <div class="spinner-grow text-primary" role="status"></div>
        <p class="mt-2">正在取得氣象數據...</p>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="weatherCards">
        </div>
</div>

<script src="script.js"></script>
</body>
</html>
